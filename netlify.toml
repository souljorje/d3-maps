[build]
command = "pnpm build:docs"
publish = "packages/docs/.vitepress/dist"
ignore = "node ./scripts/netlify-ignore-build.mjs"

# Configure `TURBO_TEAM` and `TURBO_TOKEN` in Netlify site environment variables
# to enable Turbo Remote Cache for docs generation and VitePress build tasks.
[build.environment]
NODE_VERSION = "24"

[[edge_functions]]
path = "/*"
function = "markdown-negotiation"

  [edge_functions.header]
  accept = "text/markdown"
