name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  detect_docs_changes:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect docs changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: .github/path-filters.yml

  deploy:
    needs: detect_docs_changes
    if: always() && (github.event_name == 'workflow_dispatch' || needs.detect_docs_changes.outputs.docs == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify production deploy
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK_URL" ]; then
            echo "Missing required secret NETLIFY_BUILD_HOOK_URL" >&2
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Content-Type: application/json" \
            --data '{}' \
            "$NETLIFY_BUILD_HOOK_URL"
